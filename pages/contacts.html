		<!-- MAIN CONTENT -->
		<main>

			<!-- CONTACT US -->
			<section class="contact-me section-wrapper">
				<h1 class="title wow slideInLeft" data-wow-delay="0.25s">This is it!</h1>
				<h2 class="subtitle wow slideInLeft" data-wow-delay="0.5s">Work with me</h2>
				<div class="form-set wow fadeIn">

					<!-- FORM -->
					<form>

						<!-- USER INFO SET -->
						<fieldset>
							<label for="username" class="contacts-title">Your name</label>
							<input id="username" type="text" name="username" placeholder="Enter your name...">
							<label for="email" class="contacts-title">Your email</label>
							<input id="email" type="email" name="email" placeholder="Enter your email...">
						</fieldset>

						<!-- USER MESSAGE SET -->
						<fieldset>
							<label for="textarea" class="contacts-title">Your message</label>
							<textarea id="textarea" cols="" rows="5" placeholder="Enter your message..."></textarea>
							<div class="msg-check-box">
								<input id="msg-check" type="checkbox" name="msg-check" checked>
								<label for="msg-check">it&#39;s very important and I want you to contact me immediately</label>
							</div>
						</fieldset>

						<button class="button wow pulse" data-wow-iteration="4">Click to send</button>

					</form>

					<!-- CONTACTS ASIDE -->
					<div class="contacts-aside">
						<div class="contacts-img">
							<img src="../images/img_10.jpg" alt="">
						</div>
						<div class="contacts-info">
							<div>
								<p class="contacts-title">Feel free to call me</p>
								<p>+358 45 14 11 544</p>
							</div>
							<div>
								<p class="contacts-title">skype:</p>
								<p>iren_sula</p>
							</div>
						</div>
					</div>
				</div>
			</section>

		</main>
